exclude: "^docs/|/migrations/|^tests/"
default_stages: [pre-commit]

repos:

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Built stylesheets are generated (minified, no trailing newline) — leave
      # them alone, or these hooks fight the Tailwind build and the Stylesheet
      # drift-check CI fails on the hook-added newline.
      - id: trailing-whitespace
        exclude: '^(mvp|demo)/static/css/.*\.(css|br)$'
      - id: end-of-file-fixer
        exclude: '^(mvp|demo)/static/css/.*\.(css|br)$'
      - id: check-yaml

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py310-plus]

  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.14.7
    hooks:
      - id: ruff

  - repo: https://github.com/psf/black
    rev: 25.11.0
    hooks:
      - id: black

  - repo: https://github.com/python-poetry/poetry
    rev: '2.3.4'
    hooks:
      - id: poetry-check

  # Local hooks that use Poetry environment
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: poetry run mypy mvp
        language: system
        pass_filenames: false
        files: ^mvp/
  - repo: local
    hooks:
      - id: deptry
        name: deptry
        language: python
        entry: deptry
        additional_dependencies: ["deptry==0.24.0"]
        args: ["--verbose", "."]
        pass_filenames: false
        always_run: true


# sets up .pre-commit-ci.yaml to ensure pre-commit dependencies stay up to date
ci:
  autoupdate_schedule: monthly
  skip: [mypy, deptry]  # Skip hooks that use the local Poetry environment in CI
  submodules: false
