{# DaisyUI sidebar menu — leaf item (no children) #}
<li>
  <a href="{{ url }}"
     class="{% if selected %}active{% endif %}">
    {% if icon %}<i class="bi bi-{{ icon }}"></i>{% endif %}
    {{ label }}
    {% if badge %}<span class="badge badge-sm ms-auto">{{ badge }}</span>{% endif %}
  </a>
</li>
