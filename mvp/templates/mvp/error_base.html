{% extends "mvp/base.html" %}
{% load i18n mvp %}
{% block title %}
  {% trans "Error" %}
{% endblock title %}
{% block app %}
  <c-entrance>
    <img src="{% logo_url "md" %}"
         width="auto"
         height="auto"
         class="max-h-16 mb-4" />
    <p class="text-6xl font-black text-base-content/10 mb-2 text-center">
      {% block error_code %}{% endblock %}
    </p>
    <h1 class="text-2xl font-bold mb-2 text-center">
      {% block heading %}{% endblock %}
    </h1>
    <c-text size="xl" muted align="center">
      {% block description %}{% endblock %}
    </c-text>
    {% block actions %}
      <c-button variant="ghost"
                icon="arrow-left"
                href="/"
                text="{% trans "Return to site" %}" />
    {% endblock %}
  </c-entrance>
{% endblock app %}
