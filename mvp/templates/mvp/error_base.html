{% extends "mvp/base.html" %}
{% load i18n mvp %}
{% block title %}
  {% trans "Error" %}
{% endblock title %}
{% block app %}
  <c-entrance>
    <img src="{% logo_url "md" %}"
         width="auto"
         height="auto"
         class="max-h-16 mb-4" />
    <p class="text-6xl font-black text-base-content/10 mb-2">
      {% block error_code %}{% endblock %}
    </p>
    <h1 class="text-2xl font-bold mb-2">
      {% block heading %}{% endblock %}
    </h1>
    <c-text impact muted center>
      {% block description %}{% endblock %}
    </c-text>
    {% block actions %}{% endblock %}
  </c-entrance>
{% endblock app %}
