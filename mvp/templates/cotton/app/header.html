{% load mvp %}
<c-vars title tray />
<div class="sticky top-0 z-30 w-full">
  <div class="navbar bg-base-100 shadow-sm min-h-14">
    <div class="navbar-start gap-1">
      <label for="drawer-toggle"
             aria-label="open sidebar"
             class="btn btn-ghost btn-square lg:hidden">
        <i class="bi bi-list text-xl"></i>
      </label>
      <a class="lg:hidden" href="/">
        <c-logo max-height="1.5rem" />
      </a>
    </div>
    <div class="navbar-end gap-1">{{ right }}</div>
  </div>
  {% if not tray|slot_is_empty %}
    <div class="bg-base-200 px-4 py-1 border-t border-base-300">{{ tray }}</div>
  {% endif %}
</div>
