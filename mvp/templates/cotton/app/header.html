<c-vars title class="bg-body" :border="True" tray />
<header class="app-header container-full">
  <nav class="container-fluid navbar bg-body">
    <c-mvp-toolbar title="{{ title }}"
                   class="container-fluid hide-btn-text"
                   tight
                   row>
      <c-slot name="start">
        <c-button text="toggle"
                  icon="menu"
                  class="btn-txt"
                  data-lte-toggle="sidebar" />
        <a class="navbar-brand align-middle" href="/">{{ request.site.name }}</a>
      </c-slot>
      <c-action-row gap=1>
        {{ right }}
      </c-action-row>
    </c-mvp-toolbar>
  </nav>
  {% if tray %}{{ tray }}{% endif %}
</header>
