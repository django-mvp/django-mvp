{% load mvp %}
<c-vars title variant="body" :border="True" tray />
<header class="app-header sticky-top">
  <nav class="navbar bg-{{ variant }}">
    <c-container fluid>
      <c-toolbar class="hide-btn-text btn-icons" tight row>
        <div class="d-inline-flex">
          <c-button text="{% trans "Toggle site navigation" %}"
                    outline
                    icon="menu"
                    data-lte-toggle="sidebar" />
          <a class="navbar-brand ms-1 show-on-mobile" href="/">
            <c-logo max-height="0.9lh" />
          </a>
        </div>
        <c-slot name="actions">
          {{ right }}
        </c-slot>
      </c-toolbar>
    </c-container>
  </nav>
  {% if not tray|slot_is_empty %}<div class="header-tray">{{ tray }}</div>{% endif %}
</header>
