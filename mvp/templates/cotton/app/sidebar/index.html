{% load flex_menu %}
<c-vars brand-text brand-url="/" class menu="AppMenu" />
<aside class="bg-base-200 min-h-full w-72 flex flex-col {{ class }}">
  <c-app.sidebar.header link="{{ brand_url }}" />
  <nav class="flex-1 overflow-y-auto p-2">
    {% render_menu menu renderer="adminlte" %}
  </nav>
  {% if request.user.is_authenticated %}
    <div class="sticky bottom-0 bg-base-200 border-t border-base-300 p-2">
      <c-user.sidebar-menu />
    </div>
  {% endif %}
</aside>
