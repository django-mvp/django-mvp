{% load flex_menu %}
<c-vars brand_text
        brand_logo
        brand_icon
        brand_url="/"
        class
        menu="AppMenu"
        renderer="adminlte" />
<aside class="app-sidebar shadow d-flex flex-column {{ class }}"
       data-bs-theme="dark">
  <c-app.sidebar.header text="{{ brand_text }}"
                        icon="{{ brand_icon }}"
                        logo="{{ brand_logo }}"
                        link="{{ brand_url }}" />
  <div class="sidebar-wrapper">
    <nav class="mt-2">
      {% render_menu menu renderer=renderer %}
    </nav>
  </div>
  {% if footer %}<div class="sidebar-footer px-1 py-2 mt-auto">{{ footer }}</div>{% endif %}
</aside>
<div class="sidebar-overlay"
     data-lte-toggle="sidebar"
     data-lte-dismiss="sidebar-menu"></div>
