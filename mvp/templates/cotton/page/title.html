<!-- ── Page Title Section ───────────────────────── -->
<header>
  <!-- Caption -->
  {% if caption %}
    <c-text class="page-header-caption mb-1">
      {{ caption }}
    </c-text>
  {% endif %}
  <!-- Title + Actions row -->
  <c-mvp.toolbar :attrs="attrs" />
  <!-- Subtitle / Lead -->
  {% if subtitle %}
    <c-text impact tight>
      {{ subtitle }}
    </c-text>
  {% endif %}
</header>
