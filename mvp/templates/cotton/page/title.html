<c-vars title subtitle caption icon class actions />
<div class="flex flex-col gap-1 {{ class }}">
  {% if caption %}<p class="text-xs font-semibold tracking-widest uppercase opacity-60">{{ caption }}</p>{% endif %}
  <c-toolbar>
    <h1 class="text-2xl font-bold leading-tight">
      {% if icon %}<c-icon name="{{ icon }}" />{% endif %}
      {{ title }}
    </h1>
  </c-toolbar>
  {% if subtitle %}<p class="opacity-70 leading-relaxed max-w-prose">{{ subtitle }}</p>{% endif %}
</div>
