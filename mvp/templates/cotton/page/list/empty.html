<c-vars icon="search"
        heading
        message
        icon_class="display-1 text-muted mb-3" />
<div class="w-100" {{ attrs }}>
  <div class="text-center py-5">
    <c-icon name="{{ icon }}" class="{{ icon_class }}" />
    <i class="{{ icon }} {{ icon_class }}"></i>
    <h3 class="text-muted">{{ heading }}</h3>
    <p class="text-muted">{{ message }}</p>
    {% if directory.create_url %}
      <c-button variant="primary"
                size="lg"
                icon="add"
                text="{% trans "Add new" %}"
                href="{{ directory.create_url }}" />
    {% endif %}
  </div>
</div>
