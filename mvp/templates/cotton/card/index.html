<c-vars title icon variant="default" fill="outline" class />
<c-card.wrapper :variant="variant" :fill="fill" only>
  {% if header %}
    {{ header }}
  {% elif title %}
    <div class="card-header">
      <c-mvp.toolbar :title="title"
                     :icon="icon"
                     level="5"
                     fs="5"
                     :actions="widgets"
                     tight
                     only />
    </div>
  {% endif %}
  <c-card.body>
    {{ slot }}
  </c-card.body>
  {% if footer_start or footer_end %}
    <div class="card-footer">
      <c-mvp.toolbar :actions="footer_end" tight only>
        {{ footer_start }}
      </c-mvp.toolbar>
    </div>
  {% endif %}
</c-card.wrapper>
