<c-vars icon="" icon_class="text-primary" time="" text="" />
<li>
  <div class="timeline-start timeline-box text-sm opacity-60">
    {% if time %}{{ time }}{% endif %}
  </div>
  <div class="timeline-middle">
    <i class="bi bi-{% if icon %}{{ icon }}{% else %}circle-fill{% endif %} {{ icon_class }}"></i>
  </div>
  <div class="timeline-end timeline-box">{{ text }}{{ slot }}</div>
  <hr />
</li>
