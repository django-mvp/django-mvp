<c-vars variant="primary" title="Direct Chat" class />
<div class="card {{ class }}">
  <div class="card-body p-3">
    <div class="flex justify-between items-center mb-3">
      <h3 class="card-title text-base">{{ title }}</h3>
    </div>
    <div class="flex flex-col gap-2">{{ messages }}</div>
  </div>
  {% if footer %}<div class="card-body pt-0">{{ footer }}</div>{% endif %}
</div>
