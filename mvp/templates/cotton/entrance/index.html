{% load cotton %}
<c-vars width="default"
        full-height
        :width_opts="{'default': 'max-w-4xl', 'narrow':'max-w-sm', 'wide': 'container'}" />
<c-entrance.background>
  <div class="card py-24 bg-base-100 shadow-xl w-full {{ width_opts|get_item:width }} {% if full_height %}h-90/100{% endif %} ">
    <!-- Card content -->
    <div class="card-body py-8 items-center ">{{ slot }}</div>
  </div>
</c-entrance.background>
