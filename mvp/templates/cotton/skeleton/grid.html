{% load mvp %}
<c-vars n
        message="{% trans "Coming soon..." %}"
        height
        icon
        item_class />
<c-grid :attrs="attrs">
  {% for i in 0|nrange:n %}
    <c-placeholder.card :message="message"
                        :height="height"
                        :icon="icon"
                        :class="item_class" />
  {% endfor %}
</c-grid>
