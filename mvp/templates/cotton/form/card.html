<c-vars form-obj
        icon
        title
        :submit-button="True"
        submit-text="{% trans "Submit" %}" />
<c-form :form-obj="False" :attrs="attrs">
  <c-card :footer_start="actions">
    {{ before_form }}
    {% if form_obj %}
      <c-form.render :form="form_obj" />
    {% else %}
      {{ slot }}
    {% endif %}
    {{ after_form }}
  </c-card>
</c-form>
