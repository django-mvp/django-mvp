<c-vars form-obj />
<form x-data="{form: {}}"
      {% if form_obj.is_multipart %}enctype="multipart/form-data"{% endif %}
      {{ attrs }}>
  {% if method|lower == "post" %}
    {% csrf_token %}
  {% endif %}
  {% if form_obj %}<c-form.render :form-obj="form_obj" />{% endif %}
  {{ slot }}
</form>
