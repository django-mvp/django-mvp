<c-vars renderer="crispy" form-obj />
<form x-data="{form: {}}"
      {% if form_obj.is_multipart %}enctype="multipart/form-data"{% endif %}
      {{ attrs }}>
  {% if method|lower == "post" %}
    {% csrf_token %}
  {% endif %}
  {% if renderer and form_obj %}<c-component is="form.{{ renderer }}" />{% endif %}
  {{ slot }}
  {% comment %} {% if actions %}
    <c-mvp.toolbar only>
      {{ actions }}
    </c-mvp.toolbar>
  {% endif %} {% endcomment %}
</form>
