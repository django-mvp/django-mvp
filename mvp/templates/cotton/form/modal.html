<c-vars widgets />
<c-modal fade centered>
  <c-form.card :attrs="attrs">
    <c-slot name="widgets">
      {{ widgets }}
      <c-button text="{% trans "Close modal" %}"
                icon="x"
                class="hide-btn-text"
                data-bs-dismiss="modal" />
    </c-slot>
  </c-form.card>
</c-modal>
