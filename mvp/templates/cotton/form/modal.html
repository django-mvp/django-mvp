{% load i18n %}
<c-vars widgets />
<c-modal centered>
  <c-form :attrs="attrs">
    <c-slot name="widgets">
      {{ widgets }}
      <button type="button"
              onclick="this.closest('dialog').close()"
              class="btn btn-ghost btn-sm btn-square"
              aria-label="{% trans 'Close modal' %}">
        <i class="bi bi-x text-xl"></i>
      </button>
    </c-slot>
  </c-form>
</c-modal>
