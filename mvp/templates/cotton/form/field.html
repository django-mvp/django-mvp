{% comment %} For very simple form fields {% endcomment %}
<c-vars type
        hide-label
        label
        wrapper-class
        label-class
        class />
<div class="mb-3 {{ wrapper_class }}">
  <label class="form-label{% if hide_label %} visually-hidden{% endif %} {{ label_class }} "
         {% if id %}for="{{ id }}"{% endif %}>{{ label }}</label>
  {% if type == "textarea" %}
    <textarea class="form-control {{ class }}" {{ attrs }}>
      {{ slot }}
    </textarea>
  {% else %}
    <input class="form-control {{ class }}"
           aria-label="{{ label }}"
           {{ attrs }} />
  {% endif %}
</div>
