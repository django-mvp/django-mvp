{% load i18n %}
<c-vars direction="down" />
{% comment %} <c-dropdown direction="{{ direction }}">
  <c-slot name="button">
    <c-button id="bd-theme" aria-label="{% trans "Toggle color scheme" %}" data-bs-toggle="dropdown" aria-expanded="false">
      <c-icon name="theme.light" data-lte-theme-icon="light" />
      <c-icon name="theme.dark" data-lte-theme-icon="dark" />
      <c-icon name="theme.auto" data-lte-theme-icon="auto" />
      <span class="btn-text">{% trans "Theme" %}</span>
    </c-button>
  </c-slot>
  <c-dropdown.header text="{% trans "Select a theme" %}" />
  <c-dropdown.item text="{% trans "Light" %}" icon="theme.light" data-bs-theme-value="light" aria-pressed="false">
    <c-icon name="check" class="ms-auto d-none" />
  </c-dropdown.item>
  <c-dropdown.item text="{% trans "Dark" %}" icon="theme.dark" data-bs-theme-value="dark" aria-pressed="false">
    <c-icon name="check" class="ms-auto d-none" />
  </c-dropdown.item>
  <c-dropdown.item text="{% trans "Auto" %}" icon="theme.auto" data-bs-theme-value="auto" aria-pressed="false">
    <c-icon name="check" class="ms-auto d-none" />
  </c-dropdown.item>
</c-dropdown> {% endcomment %}
<label class="flex cursor-pointer gap-2">
  <svg xmlns="http://www.w3.org/2000/svg"
       width="20"
       height="20"
       viewBox="0 0 24 24"
       fill="none"
       stroke="currentColor"
       stroke-width="2"
       stroke-linecap="round"
       stroke-linejoin="round">
    <circle cx="12" cy="12" r="5" />
    <path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" />
  </svg>
  <input type="checkbox"
         value="synthwave"
         class="toggle theme-controller" />
  <svg xmlns="http://www.w3.org/2000/svg"
       width="20"
       height="20"
       viewBox="0 0 24 24"
       fill="none"
       stroke="currentColor"
       stroke-width="2"
       stroke-linecap="round"
       stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
  </svg>
</label>
