{% if request.LANGUAGE_CODE %}
  {% load i18n %}
  <c-vars direction="down" />
  {% get_current_language as CURRENT_LANGUAGE %}
  {% get_available_languages as LANGUAGES %}
  <c-dropdown direction="{{ direction }}" only>
    <c-slot name="button">
      <c-button text="{{ CURRENT_LANGUAGE }}"
                icon="globe"
                data-bs-toggle="dropdown"
                aria-expanded="false" />
    </c-slot>
    <form action="{% url "set_language" %}" method="post">
      {% csrf_token %}
      <input type="hidden"
             name="next"
             value="{{ request.get_full_path }}" />
      <c-dropdown.header text="{% trans "Select a language" %}" />
      {% for lang_code, lang_name in LANGUAGES|slice:10 %}
        <c-dropdown.item text="{{ lang_name }}"
                         type="submit"
                         name="language"
                         value="{{ lang_code }}"
                         :active="lang_code == CURRENT_LANGUAGE"
                         only />
      {% endfor %}
    </form>
  </c-dropdown>
{% endif %}
