{% load i18n %}
<c-vars divider items class />
<nav class="breadcrumbs text-sm {{ class }}"
     aria-label="{% trans "Breadcrumbs" %}"
     {{ attrs }}>
  <ul>
    {% if items %}
      {% for item in items %}<c-navigation.breadcrumbs.item :attrs="item" />{% endfor %}
    {% else %}
      {{ slot }}
    {% endif %}
  </ul>
</nav>
