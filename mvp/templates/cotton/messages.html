<c-vars dismissible :delay=2000 />
<div class="toast toast-top toast-end z-50">
  {% for message in messages %}
    <c-alert variant="{% if message.level_tag == 'debug' %}info{% else %}{{ message.level_tag }}{% endif %}"
             :dismissible="dismissible"
             :delay="delay"
             class="shadow-lg">
      <span>{{ message }}</span>
    </c-alert>
  {% endfor %}
</div>
