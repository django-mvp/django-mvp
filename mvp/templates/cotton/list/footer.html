{% load i18n %}
<c-toolbar>
  {% if page_obj %}
    <c-text small>
      {% with start=page_obj.start_index end=page_obj.end_index total=page_obj.paginator.count %}
        {% blocktrans %}
          Showing {{ start }}-{{ end }} of {{ total }} entries
          {% endblocktrans %}
      {% endwith %}
    </c-text>
  {% endif %}
  <c-pagination :page_obj="page_obj" />
</c-toolbar>
