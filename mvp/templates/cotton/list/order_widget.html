{% if order_by_choices %}
  <div class="dropdown dropdown-end">
    <div tabindex="0"
         role="button"
         class="btn btn-ghost btn-sm gap-1">
      <i class="bi bi-sort-down"></i> Sort
    </div>
    <ul tabindex="0"
        class="dropdown-content menu bg-base-100 rounded-box z-50 w-48 p-2 shadow-lg border border-base-300">
      {% for key, label, _ in order_by_choices %}
        <li>
          <a href="#"
             class="{% if current_ordering == key %}active{% endif %} ordering-option"
             data-order-value="{{ key }}"
             onclick="submitOrdering(event, '{{ key }}')">
            {{ label }}
            {% if current_ordering == key %}<i class="bi bi-check ms-auto"></i>{% endif %}
          </a>
        </li>
      {% endfor %}
    </ul>
  </div>
  <script>
    function submitOrdering(event, orderValue) {
      event.preventDefault();
      const form = document.getElementById('filterForm');
      if (form) {
        // Find or create the ordering input
        let orderInput = form.querySelector('input[name="o"]');
        if (!orderInput) {
          orderInput = document.createElement('input');
          orderInput.type = 'hidden';
          orderInput.name = 'o';
          form.appendChild(orderInput);
        }
        orderInput.value = orderValue;
        form.submit();
      }
    }
  </script>
{% endif %}
