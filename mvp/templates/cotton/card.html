<c-vars title icon class />
<div class="card bg-base-100 shadow-sm {{ class }}">
  <div class="card-body">
    {% if title %}
      <h2 class="card-title mb-3">
        {% if icon %}<c-icon name="{{ icon }}" />{% endif %}
        {{ title }}
      </h2>
    {% endif %}
    {{ slot }}
  </div>
</div>
