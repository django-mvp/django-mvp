name: Stylesheet

# The shipped stylesheet (mvp/static/css/django-mvp.css + its brotli sibling) is a
# committed build artifact of assets/tailwind.css + the templates. It is rebuilt and
# committed at release time by `invoke prerelease` (which has Node available locally),
# so contributors do NOT need to compile it in a pull request.
#
# This workflow used to regenerate the CSS in CI and fail if it did not match the
# committed bytes. That gate was impossible to satisfy: the Tailwind v4 / daisyUI
# build is non-deterministic (consecutive builds with an identical, pinned toolchain
# produce different bytes), so the byte comparison failed PRs for drift that no
# contributor could fix. It has been replaced with a compile check that only proves
# the stylesheet still *builds* from the pinned toolchain — catching a broken Tailwind
# entry, bad @source, or plugin error, without any byte comparison or churn.

on:
  pull_request:
    paths:
      - 'assets/**'
      - 'mvp/**'
      - 'demo/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/stylesheet.yml'
  workflow_dispatch:

jobs:
  css-compiles:
    name: Stylesheet compiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # package-lock.json is committed and pins the exact Tailwind/daisyUI toolchain,
      # so `npm ci` reproduces the same tool versions used by `invoke prerelease`.
      - run: npm ci

      - name: Build the shipped and demo stylesheets
        run: |
          npm run build:css:prod
          npm run build:demo:prod
