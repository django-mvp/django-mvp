# Triggered after the Build workflow completes successfully on main.
# Checks if the triggering commit has a version tag (e.g. v1.2.3).
# If so, publishes to PyPI and creates a GitHub Release.
#
# To release:       invoke release --rule=patch   (bumps, tags, pushes main + tag)
# To retry failed:  invoke release --retry        (re-pushes existing tag at HEAD)
#
# skip-existing: true on PyPI publish makes retries safe — already-published
# versions are silently skipped so the GitHub Release step can still complete.
name: Release

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]
    branches: [main]

jobs:
  check-tag:
    name: Check for release tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      tag: ${{ steps.get_tag.outputs.tag }}
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Check for version tag on triggering commit
        id: get_tag
        run: |
          TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]' | head -1)
          if [ -z "$TAG" ]; then
            echo "No version tag on this commit — skipping release."
          else
            echo "Release tag detected: $TAG"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: check-tag
    timeout-minutes: 10
    if: ${{ needs.check-tag.outputs.tag != '' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Poetry env
        uses: SamuelJennings/cached-poetry-action@v2.0
        with:
          python-version: '3.12'

      - name: Build package
        run: poetry build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [check-tag, publish-pypi]
    timeout-minutes: 10
    if: ${{ needs.check-tag.outputs.tag != '' }}
    permissions:
      contents: write
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Build Changelog
        id: github_release
        uses: mikepenz/release-changelog-builder-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.check-tag.outputs.tag }}
          name: Release ${{ needs.check-tag.outputs.tag }}
          body: ${{ steps.github_release.outputs.changelog }}
