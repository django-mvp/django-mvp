# Triggered after the Build workflow completes successfully on main.
# Checks if the triggering commit has a version tag (e.g. v1.2.3).
# If so, publishes to PyPI and creates a GitHub Release.
#
# To release:       invoke release --rule=patch   (bumps, tags, pushes main + tag)
# To retry failed:  invoke release --retry        (re-pushes existing tag at HEAD)
name: Release

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: write

jobs:
  call-release:
    uses: django-mvp/shared/.github/workflows/release.yml@main
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    secrets: inherit

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: call-release
    if: ${{ needs.call-release.outputs.tag != '' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: django-mvp/shared/.github/actions/publish-pypi@main
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
