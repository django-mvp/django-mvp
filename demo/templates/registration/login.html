{% extends "mvp/entrance.html" %}
{% load i18n %}
{% block content %}
  <c-entrance width="narrow">
    {% if form.errors %}
      <c-alert variant="error" class="mb-6">
        <span>{% trans "Invalid username or password." %}</span>
      </c-alert>
    {% endif %}
    <h2 class="text-center mb-6">{% trans "Sign in to your account" %}</h2>
    <c-form method="post"
            action="{% url 'login' %}"
            class="space-y-4">
      <c-form.field type="text"
                    label="{% trans 'Username' %}"
                    wrapper-class="mb-4"
                    attrs='id="{{ form.username.id_for_label }}" name="{{ form.username.html_name }}" placeholder="{% trans "Username" %}" required autocomplete="username"' />
      <c-form.field type="text"
                    label="{% trans 'Password' %}"
                    wrapper-class="mb-4"
                    attrs='id="{{ form.password.id_for_label }}" name="{{ form.password.html_name }}" type="password" placeholder="{% trans "Password" %}" required autocomplete="current-password"' />
      <c-button type="submit"
                variant="primary"
                text="{% trans 'Sign In' %}"
                class="w-full" />
      <input type="hidden" name="next" value="{{ next }}" />
    </c-form>
  </c-entrance>
{% endblock content %}
